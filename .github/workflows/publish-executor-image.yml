name: Publish Executor Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: Executor package version to publish. Defaults to services/executor/package.json.
        required: false
        type: string
      publish_latest:
        description: Also tag the image as latest.
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install

      - name: Resolve executor version
        id: version
        shell: bash
        run: |
          version="${{ inputs.version }}"
          if [ -z "$version" ]; then
            version="$(node -p "require('./services/executor/package.json').version")"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch executor image
        run: |
          bun run scripts/publish-executor-image.ts \
            --version "${{ steps.version.outputs.version }}" \
            --latest "${{ inputs.publish_latest }}" \
            --revision "${{ github.sha }}" \
            --build-date "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
